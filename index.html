<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Generator Clone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">QR Code <span>Generator</span></div>
      <nav>
        <a href="#">Fonctionnalités</a>
        <a href="#">Tarifs</a>
        <a href="#">Connexion</a>
        <button class="btn btn-primary">Créer un QR Code</button>
      </nav>
    </header>

    <main class="app">
      <section class="panel panel-left">
        <h1>Créez votre QR Code</h1>
        <p class="subtitle">Un clone visuel inspiré de app.qr-code-generator.com</p>

        <div class="type-tabs" role="tablist" aria-label="Type de QR code">
          <button class="tab active" data-type="url">URL</button>
          <button class="tab" data-type="text">Texte</button>
          <button class="tab" data-type="email">Email</button>
          <button class="tab" data-type="phone">Téléphone</button>
          <button class="tab" data-type="sms">SMS</button>
          <button class="tab" data-type="wifi">Wi-Fi</button>
        </div>

        <form id="qr-form">
          <div class="field" data-field="url">
            <label for="url-input">Entrez votre URL</label>
            <input id="url-input" name="url" placeholder="https://example.com" required />
          </div>

          <div class="field hidden" data-field="text">
            <label for="text-input">Votre texte</label>
            <textarea id="text-input" name="text" placeholder="Écrivez votre message"></textarea>
          </div>

          <div class="field hidden" data-field="email">
            <label for="email-input">Adresse email</label>
            <input id="email-input" type="email" name="email" placeholder="contact@exemple.com" />
          </div>

          <div class="field hidden" data-field="phone">
            <label for="phone-input">Numéro de téléphone</label>
            <input id="phone-input" name="phone" placeholder="+33 6 00 00 00 00" />
          </div>

          <div class="field hidden" data-field="sms">
            <label for="sms-number">Numéro</label>
            <input id="sms-number" name="sms-number" placeholder="+33 6 00 00 00 00" />
            <label for="sms-message">Message</label>
            <textarea id="sms-message" name="sms-message" placeholder="Votre SMS"></textarea>
          </div>

          <div class="field hidden" data-field="wifi">
            <label for="wifi-ssid">Nom du réseau (SSID)</label>
            <input id="wifi-ssid" name="wifi-ssid" placeholder="Mon WiFi" />
            <label for="wifi-password">Mot de passe</label>
            <input id="wifi-password" name="wifi-password" type="password" placeholder="••••••••" />
          </div>

          <div class="design-controls">
            <div>
              <label for="foreground">Couleur QR</label>
              <input id="foreground" type="color" value="#111827" />
            </div>
            <div>
              <label for="background">Fond</label>
              <input id="background" type="color" value="#ffffff" />
            </div>
            <div>
              <label for="size">Taille</label>
              <input id="size" type="range" min="160" max="360" value="240" />
            </div>
          </div>

          <div class="actions">
            <button class="btn btn-primary" type="submit">Générer</button>
            <button class="btn btn-secondary" type="button" id="download">Télécharger PNG</button>
          </div>
        </form>
      </section>

      <section class="panel panel-right">
        <div class="preview-card">
          <p>Aperçu en direct</p>
          <div id="qr-preview" aria-label="QR Code preview"></div>
          <small id="payload-preview">Contenu: https://example.com</small>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
